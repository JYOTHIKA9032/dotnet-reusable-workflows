name: reusable-docker-push

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      registry:
        type: string
        required: true
      image_name:
        type: string
        required: true
      image_tag:
        type: string
        default: latest
      docker_image_artifact:
        type: string
        default: docker-image

    secrets:
      REGISTRY_USERNAME:
        required: true
      REGISTRY_PASSWORD:
        required: true

jobs:
  docker_push:
    name: Docker Push
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Download image tar
        uses: actions/download-artifact@v4
        with:
          name: ${{ inputs.docker_image_artifact }}

      - name: Load image
        run: docker load -i image.tar

      - name: Login
        uses: docker/login-action@v3
        with:
          registry: ${{ inputs.registry }}
          username: ${{ secrets.REGISTRY_USERNAME }}
          password: ${{ secrets.REGISTRY_PASSWORD }}

      - name: Tag
        run: |
          docker tag "${{ inputs.image_name }}:${{ inputs.image_tag }}" "${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.image_tag }}"

      - name: Push
        run: docker push "${{ inputs.registry }}/${{ inputs.image_name }}:${{ inputs.image_tag }}"
