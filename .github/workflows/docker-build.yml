name: reusable-docker-build

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      image_name:
        type: string
        required: true
      image_tag:
        type: string
        default: latest
      dockerfile:
        type: string
        default: Dockerfile
      context:
        type: string
        default: .
      docker_image_artifact:
        type: string
        default: docker-image

jobs:
  docker_build:
    name: Docker Build
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build image
        run: |
          docker build -f "${{ inputs.dockerfile }}" -t "${{ inputs.image_name }}:${{ inputs.image_tag }}" "${{ inputs.context }}"

      - name: Save image as tar
        run: |
          docker save "${{ inputs.image_name }}:${{ inputs.image_tag }}" -o image.tar

      - name: Upload image tar
        uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.docker_image_artifact }}
          path: image.tar
