name: reusable-dotnet-build

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest
      dotnet_version:
        type: string
        default: 8.0.x
      configuration:
        type: string
        default: Release

jobs:
  build:
    name: Build
    runs-on: ${{ inputs.runner }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Restore
        run: dotnet restore

      - name: Build
        run: dotnet build --no-restore --configuration ${{ inputs.configuration }}
