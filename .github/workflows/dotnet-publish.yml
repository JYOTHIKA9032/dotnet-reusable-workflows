name: reusable-dotnet-publish

on:
  workflow_call:
    inputs:
      runner:
        type: string
        default: ubuntu-latest

      dotnet_version:
        type: string
        default: 8.0.x

      project_path:              # ✅ REQUIRED INPUT
        type: string
        required: true

      configuration:
        type: string
        default: Release

      publish_output:
        type: string
        default: publish

      artifact_name:
        type: string
        default: dotnet-publish-output

jobs:
  publish:
    runs-on: ${{ inputs.runner }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: ${{ inputs.dotnet_version }}

      - name: Publish
        run: |
          dotnet publish ${{ inputs.project_path }} \
            -c ${{ inputs.configuration }} \
            -o ${{ inputs.publish_output }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ inputs.artifact_name }}
          path: ${{ inputs.publish_output }}